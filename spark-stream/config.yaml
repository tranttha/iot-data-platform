  # ── North America ────────────────────────────────────────────────────────────
  # Canada: stations 58 (Toronto), 59 (Vancouver), 60 (Montreal)
  - lat_min: 41.68
    lat_max: 83.34
    lon_min: -141.00
    lon_max: -52.32
    country_code: CA
    country_name: Canada
    city: Toronto

  # Mexico: station 57 (Mexico City)
  - lat_min: 14.38
    lat_max: 32.72
    lon_min: -118.60
    lon_max: -86.49
    country_code: MX
