# ─────────────────────────────────────────────────────────────────────────────
# spark-stream static configuration
#
# Rule: anything that changes between environments (credentials, hostnames,
# secrets) lives in .env and is injected via docker-compose.
# Everything structural (table names, paths, field lists, SCD keys, timeouts)
# lives here so it can be version-controlled and reviewed without touching code.
# ─────────────────────────────────────────────────────────────────────────────

# ── Defaults (overridden by environment variables at runtime) ─────────────────
defaults:
  poll_interval_seconds: 60      # must match producer; controls sleep between runs

# ── MinIO bucket layout ───────────────────────────────────────────────────────
# Paths are s3a:// URIs; credentials come from env vars.
storage:
  raw_path:        "s3a://raw/"
  staging_path:    "s3a://staging/"
  warehouse_path:  "s3a://warehouse/"
  checkpoints:
    staging:       "s3a://staging/_checkpoints/spark-stream-staging"

# ── Iceberg catalog ───────────────────────────────────────────────────────────
# Hadoop catalog: catalog root = warehouse_path. No metastore needed.
# Both spark-stream and Trino point to the same root.
iceberg:
  catalog_name:   "lakehouse"
  catalog_type:   "hive"        # HiveCatalog backed by standalone HMS
  hive_metastore_uri: "thrift://hive-metastore:9083"

# ── Staging layer ─────────────────────────────────────────────────────────────
staging:
  table: "lakehouse.staging.events"
  partition_by: "days(event_time)"

  # Deduplication: rows with the same (event_time, iot_device_id) are duplicates.
  dedup_keys:
    - event_time
    - iot_device_id

  # Source JSON fields to extract from the raw file (top-level + current.* flattened).
  # These become the columns of the staging Iceberg table.
  # Source JSON layout (inside raw_json string):
  #   iot_device_id (int), ingestion_time (ISO string),
  #   data.{dt, sunrise, sunset, temp, feels_like, pressure, humidity,
  #         dew_point, uvi, clouds, visibility, wind_speed, wind_deg,
  #         wind_gust, weather[0].{id,main,description}, rain.1h (optional)}
  #   location.{lat, lon, timezone}
  fields:
    # ── Device metadata ───────────────────────────────────────────────────────
    - name: event_time
      source: "data.dt"           # epoch seconds → from_unixtime cast
      type: timestamp
    - name: ingestion_time
      source: ingestion_time
      type: timestamp
    - name: iot_device_id
      source: iot_device_id
      type: integer
    - name: latitude
      source: "location.lat"
      type: double
    - name: longitude
      source: "location.lon"
      type: double
    - name: timezone
      source: "location.timezone"
      type: string
    # ── Daily sun events ──────────────────────────────────────────────────────
    - name: sunrise
      source: "data.sunrise"      # epoch seconds → from_unixtime cast
      type: timestamp
    - name: sunset
      source: "data.sunset"       # epoch seconds → from_unixtime cast
      type: timestamp
    # ── Weather measurements ──────────────────────────────────────────────────
    - name: temp
      source: "data.temp"
      type: double
    - name: feels_like
      source: "data.feels_like"
      type: double
    - name: pressure
      source: "data.pressure"
      type: integer
    - name: humidity
      source: "data.humidity"
      type: integer
    - name: dew_point
      source: "data.dew_point"
      type: double
    - name: uvi
      source: "data.uvi"
      type: double
    - name: clouds
      source: "data.clouds"
      type: integer
    - name: visibility
      source: "data.visibility"
      type: integer
    - name: wind_speed
      source: "data.wind_speed"
      type: double
    - name: wind_deg
      source: "data.wind_deg"
      type: integer
    - name: wind_gust
      source: "data.wind_gust"
      type: double
    # ── Weather condition ─────────────────────────────────────────────────────
    - name: weather_id
      source: "data.weather[0].id"
      type: integer
    - name: weather_main
      source: "data.weather[0].main"
      type: string
    - name: weather_description
      source: "data.weather[0].description"
      type: string
    - name: rain_1h
      source: "data.rain.1h"      # nullable — absent when no rain
      type: double

# ── Warehouse layer ───────────────────────────────────────────────────────────
warehouse:

  dim_date:
    table: "lakehouse.warehouse.dim_date"
    # Natural key = surrogate key (dates are immutable, no SCD needed).
    natural_key: date_key          # integer YYYYMMDD
    # Columns derived from event_time at write time — no source field mapping needed.

  dim_iot_device:
    table: "lakehouse.warehouse.dim_iot_device"
    scd_type: 2
    natural_key: iot_device_id
    # SCD Type 2 opens a new version when any tracked_attribute changes.
    tracked_attributes:
      - latitude
      - longitude
      - timezone
    surrogate_key: device_sk       # MD5(iot_device_id || effective_start)
    effective_start_col: effective_start
    effective_end_col:   effective_end    # NULL = currently active row
    is_current_col:      is_current

  dim_country:
    table: "lakehouse.warehouse.dim_country"
    scd_type: 2
    # Country is derived from (latitude, longitude) via bounding-box lookup,
    # not from a raw source field. Natural key scoped per device.
    natural_key:
      - iot_device_id
      - country_code
    tracked_attributes:
      - country_code
      - country_name
      - city
    surrogate_key: country_sk      # MD5(iot_device_id || country_code || effective_start)
    effective_start_col: effective_start
    effective_end_col:   effective_end
    is_current_col:      is_current

  fact_measurements:
    table: "lakehouse.warehouse.fact_measurements"
    surrogate_key: fact_sk         # UUID per row
    # Foreign keys resolved at write time from dimension current rows.
    foreign_keys:
      date_key:    dim_date.date_key
      device_sk:   dim_iot_device.device_sk   # WHERE is_current = true
      country_sk:  dim_country.country_sk      # WHERE is_current = true
    # Denormalized readable columns — carried at write time, no join needed in dashboards.
    denormalized_fields:
      - iot_device_id   # from staging directly
      - country_code    # from dim_country current row at write time
    # Measurement columns copied directly from staging (all weather fields).
    measurement_fields:
      - sunrise
      - sunset
      - temp
      - feels_like
      - pressure
      - humidity
      - dew_point
      - uvi
      - clouds
      - visibility
      - wind_speed
      - wind_deg
      - wind_gust
      - rain_1h
    # Partitioning + sort: Trino prunes to day-level files; min/max skipping within file.
    partition_by: "days(event_time)"
    sort_order:
      - event_time
      - iot_device_id
    # Iceberg table properties set at CREATE TABLE time.
    table_properties:
      write.parquet.compression-codec: snappy          # faster decompress than gzip
      write.metadata.delete-after-commit.enabled: "true"
      write.metadata.previous-versions-max: "10"       # cap metadata file growth
      read.split.target-size: "134217728"              # 128 MB Trino split

  # Pre-aggregated hourly rollup — powers overview dashboard panels without scanning fact.
  fact_hourly_agg:
    table: "lakehouse.warehouse.fact_hourly_agg"
    # Natural key: one row per (hour_bucket, iot_device_id).
    natural_key:
      - hour_bucket
      - iot_device_id
    # Denormalized for join-free dashboards.
    denormalized_fields:
      - country_code
    # Aggregated metric columns (avg over the hour window).
    agg_fields:
      - avg_temp
      - avg_feels_like
      - avg_humidity
      - avg_pressure
      - avg_wind_speed
      - avg_uvi
      - avg_clouds
      - avg_visibility
      - avg_rain_1h        # nullable — null when no rain events in hour
    partition_by: "days(hour_bucket)"
    sort_order:
      - hour_bucket
      - iot_device_id
    table_properties:
      write.parquet.compression-codec: snappy
      write.metadata.delete-after-commit.enabled: "true"
      write.metadata.previous-versions-max: "10"


# ── Country bounding-box lookup ───────────────────────────────────────────────
# Used by dim_country to map (lat, lon) → (country_code, country_name, city).
# Evaluated top-to-bottom; first match wins.
# Bounding boxes sourced from OpenStreetMap Nominatim (OSM relation bounds).
# Order: smaller/overlapping countries before larger ones.
# Stations covered: IDs 1-60 from config.yaml.
