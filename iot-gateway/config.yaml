# ── Defaults (overridden by environment variables at runtime) ─────────────────
defaults:
  kafka_topic: "iot-sensor-data"
  poll_interval_seconds: 600       # 10-min micro-batch boundary
  num_stations: 60
  kill_after_seconds: 9600         # 16 batches × 600 s = 160 min

# ── OpenWeatherMap One Call 3.0 ───────────────────────────────────────────────
# openweathermap:
#   url: "https://api.openweathermap.org/data/3.0/onecall"
#   units: "metric"
#   exclude: "minutely,hourly,daily,alerts"

# ── Rate limits (OWM One Call 3.0 free tier) ──────────────────────────────────
# 1,000 calls/day free; 60 calls/minute hard cap.
# 1 container × 60 stations/batch × 16 batches (kill_after ÷ poll_interval)
#   = 960 calls/run  ✓  (≤ 1,000/day)
# Intra-batch cadence: 1 station/second → 60 calls in 60 s → 60 calls/min  ✓
# rate_limits:
#   max_calls_per_day: 1000
#   max_calls_per_minute: 60

# ── Weather stations ────────────────────────────────────────────────────
# Schema: {id: int, lat: float, lon: float}
# 60 globally distributed stations; id 1 → 60.
