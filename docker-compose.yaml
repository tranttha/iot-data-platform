version: '3.9'

# Profiles
# ─────────────────────────────────────────────────────────────────────────────
#  ingest     → Zookeeper + Kafka + IoT Gateways + Spark cluster + kafka-spark-consumer → MinIO /raw
#  processing → MinIO + spark-stream (reads /raw, writes to /warehouse)
#  serve      → MinIO + Trino + Grafana
#  full       → All services (end-to-end testing)
#
# Usage:
#   docker compose --profile ingest     up -d
#   docker compose --profile processing up -d
#   docker compose --profile serve      up -d
#   docker compose --profile full       up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  ####################################################
  # ZOOKEEPER
  ####################################################

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper

    profiles: [ingest, full]

    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_CLIENT_PORT}
      ZOOKEEPER_TICK_TIME: ${ZOOKEEPER_TICK_TIME}

    ports:
      - "2181:2181"

  ####################################################
  # KAFKA BROKER
  ####################################################

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka

    profiles: [ingest, full]

    depends_on:
      - zookeeper

    ports:
      - "9092:9092"

    environment:
      KAFKA_BROKER_ID: ${KAFKA_BROKER_ID}

      KAFKA_ZOOKEEPER_CONNECT: ${KAFKA_ZOOKEEPER_CONNECT}

      KAFKA_LISTENERS: ${KAFKA_LISTENERS}
      KAFKA_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS}

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR}

  ####################################################
  # MINIO
  ####################################################

  minio:
    image: minio/minio:latest
    container_name: minio

    profiles: [ingest, processing, serve, full]

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - ./minio-data:/data

  ####################################################
  # CREATE MINIO BUCKETS
  ####################################################

  mc:
    image: minio/mc
    container_name: minio-client

    profiles: [ingest, processing, serve, full]

    depends_on:
      - minio

    entrypoint: >
      /bin/sh -c "
      sleep 10;
      mc alias set local ${MINIO_ENDPOINT} ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY};
      mc mb local/raw;
      mc mb local/staging;
      mc mb local/warehouse;
      exit 0;
      "

  ####################################################
  # IOT GATEWAY
  ####################################################

  iot-gateway-1:
    build:
      context: ./iot-gateway

    container_name: iot-gateway-1

    profiles: [ingest, full]

    depends_on:
      - kafka

    environment:
      DEVICE_ID: ${DEVICE_1_ID}
      LATITUDE: ${DEVICE_1_LATITUDE}
      LONGITUDE: ${DEVICE_1_LONGITUDE}

      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}

      OPENMETEO_MAX_CALLS_PER_MIN: ${OPENMETEO_MAX_CALLS_PER_MIN}
      NUM_GATEWAY_CONTAINERS: ${NUM_GATEWAY_CONTAINERS}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS}

  iot-gateway-2:
    build:
      context: ./iot-gateway

    container_name: iot-gateway-2

    profiles: [ingest, processing, full]

    depends_on:
      - kafka

    environment:
      DEVICE_ID: ${DEVICE_2_ID}
      LATITUDE: ${DEVICE_2_LATITUDE}
      LONGITUDE: ${DEVICE_2_LONGITUDE}

      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}

      OPENMETEO_MAX_CALLS_PER_MIN: ${OPENMETEO_MAX_CALLS_PER_MIN}
      NUM_GATEWAY_CONTAINERS: ${NUM_GATEWAY_CONTAINERS}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS}

  ####################################################
  # SPARK CLUSTER (INGESTION)
  ####################################################

  spark-master:
    image: bitnami/spark:3.5
    container_name: spark-master

    profiles: [ingest, processing, full]

    environment:
      SPARK_MODE: master
      SPARK_MASTER_PORT: 7077
      SPARK_MASTER_WEBUI_PORT: 8081

    ports:
      - "7077:7077"
      - "8081:8081"

  spark-worker:
    image: bitnami/spark:3.5
    container_name: spark-worker

    profiles: [ingest, processing, full]

    depends_on:
      - spark-master

    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: ${SPARK_MASTER_URL}
      SPARK_WORKER_MEMORY: ${SPARK_WORKER_MEMORY}
      SPARK_WORKER_CORES: ${SPARK_WORKER_CORES}

    ports:
      - "8082:8081"

  ####################################################
  # KAFKA RAW CONSUMER (SPARK STRUCTURED STREAMING)
  ####################################################

  kafka-spark-consumer:
    build:
      context: ./kafka-spark-consumer

    container_name: kafka-spark-consumer

    profiles: [ingest, full]

    depends_on:
      - spark-master
      - kafka
      - minio

    environment:
      SPARK_MASTER_URL: ${SPARK_MASTER_URL}

      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_TOPIC: ${KAFKA_TOPIC}

      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}

    volumes:
      - ivy2_cache:/root/.ivy2 # Cache for Spark dependencies

  ####################################################
  # SPARK STREAM PROCESSING
  ####################################################

  spark-stream:
    build:
      context: ./spark-stream

    container_name: spark-stream

    profiles: [processing, full]

    depends_on:
      - spark-master
      - minio

    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}

  ####################################################
  # TRINO
  ####################################################

  trino:
    image: trinodb/trino:latest
    container_name: trino

    profiles: [serve, full]

    depends_on:
      - minio

    ports:
      - "8080:8080"

    volumes:
      - ./trino/catalog:/etc/trino/catalog

  ####################################################
  # GRAFANA
  ####################################################

  grafana:
    image: grafana/grafana:latest
    container_name: grafana

    profiles: [serve, full]

    depends_on:
      - trino

    ports:
      - "3000:3000"

    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}

volumes:
  ivy2_cache:

