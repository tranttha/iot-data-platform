version: '3.9'

services:

  ####################################################
  # ZOOKEEPER
  ####################################################

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper

    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

    ports:
      - "2181:2181"

  ####################################################
  # KAFKA BROKER
  ####################################################

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka

    depends_on:
      - zookeeper

    ports:
      - "9092:9092"

    environment:
      KAFKA_BROKER_ID: 1

      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  ####################################################
  # MINIO
  ####################################################

  minio:
    image: minio/minio:latest
    container_name: minio

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - minio_data:/data

  ####################################################
  # CREATE MINIO BUCKETS
  ####################################################

  mc:
    image: minio/mc
    container_name: minio-client

    depends_on:
      - minio

    entrypoint: >
      /bin/sh -c "
      sleep 10;
      mc alias set local http://minio:9000 admin password123;
      mc mb local/raw;
      mc mb local/staging;
      mc mb local/warehouse;
      exit 0;
      "

  ####################################################
  # IOT GATEWAY
  ####################################################

  iot-gateway-1:
    build:
      context: ./iot-gateway

    container_name: iot-gateway-1

    depends_on:
      - kafka

    environment:
      DEVICE_ID: device_1
      LATITUDE: 52.52
      LONGITUDE: 13.41

      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  iot-gateway-2:
    build:
      context: ./iot-gateway

    container_name: iot-gateway-2

    depends_on:
      - kafka

    environment:
      DEVICE_ID: device_2
      LATITUDE: 48.85
      LONGITUDE: 2.35

      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  ####################################################
  # KAFKA RAW CONSUMER
  ####################################################

  kafka-consumer-raw:
    build:
      context: ./kafka-consumer-raw

    container_name: kafka-consumer-raw

    depends_on:
      - kafka
      - minio

    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: password123

  ####################################################
  # SPARK STREAM PROCESSING
  ####################################################

  spark-stream:
    build:
      context: ./spark-stream

    container_name: spark-stream

    depends_on:
      - kafka
      - minio

    environment:
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password123
      AWS_REGION: us-east-1

  ####################################################
  # TRINO
  ####################################################

  trino:
    image: trinodb/trino:latest
    container_name: trino

    depends_on:
      - minio

    ports:
      - "8080:8080"

    volumes:
      - ./trino/catalog:/etc/trino/catalog

  ####################################################
  # GRAFANA
  ####################################################

  grafana:
    image: grafana/grafana:latest
    container_name: grafana

    depends_on:
      - trino

    ports:
      - "3000:3000"

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin

volumes:
  minio_data: