# Profiles
# ─────────────────────────────────────────────────────────────────────────────
#  ingest     → Zookeeper + Kafka + IoT Gateways + Spark cluster + kafka-spark-consumer → MinIO /raw
#  processing → MinIO + spark-stream (reads /raw, writes to /warehouse)
#  serve      → MinIO + Trino + Grafana
#  full       → All services (end-to-end testing)
#
# Usage:
#   docker compose --profile ingest     up -d
#   docker compose --profile processing up -d
#   docker compose --profile serve      up -d
#   docker compose --profile full       up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  ####################################################
  # ZOOKEEPER
  ####################################################

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper

    profiles: [iot, ingest, full]

    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_CLIENT_PORT}
      ZOOKEEPER_TICK_TIME: ${ZOOKEEPER_TICK_TIME}

    ports:
      - "2181:2181"

  ####################################################
  # KAFKA BROKER
  ####################################################

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka

    profiles: [iot, ingest, full]

    depends_on:
      - zookeeper

    ports:
      - "9092:9092"

    environment:
      KAFKA_BROKER_ID: ${KAFKA_BROKER_ID}

      KAFKA_ZOOKEEPER_CONNECT: ${KAFKA_ZOOKEEPER_CONNECT}

      KAFKA_LISTENERS: ${KAFKA_LISTENERS}
      KAFKA_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS}

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR}
      KAFKA_NUM_PARTITIONS: ${KAFKA_NUM_PARTITIONS}

  ####################################################
  # KAFKA TOPIC SETUP
  ####################################################

  # kafka-setup:
  #   image: confluentinc/cp-kafka:7.4.0
  #   container_name: kafka-setup

  #   profiles: [iot, ingest, full]

  #   depends_on:
  #     - kafka

  #   entrypoint: |
  #     /bin/sh -c "
  #     echo 'Waiting for Kafka...';
  #     until kafka-topics --bootstrap-server kafka:9092 --list > /dev/null 2>&1; do sleep 2; done;
  #     echo 'Deleting topic if it exists...';
  #     kafka-topics --bootstrap-server kafka:9092 --delete --topic ${KAFKA_TOPIC} 2>/dev/null || true;
  #     echo 'Waiting for deletion to complete...';
  #     while kafka-topics --bootstrap-server kafka:9092 --describe --topic ${KAFKA_TOPIC} > /dev/null 2>&1; do echo 'Still deleting...'; sleep 2; done;
  #     echo 'Creating topic...';
  #     kafka-topics --bootstrap-server kafka:9092 --create --topic ${KAFKA_TOPIC} --partitions ${KAFKA_NUM_PARTITIONS} --replication-factor 1;
  #     echo 'Topic setup complete:';
  #     kafka-topics --bootstrap-server kafka:9092 --describe --topic ${KAFKA_TOPIC};
  #     "

  ####################################################
  # MINIO
  ####################################################

  minio:
    image: minio/minio:latest
    container_name: minio

    profiles: [ingest, processing, serve, full]

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - ./minio-data:/data

  ####################################################
  # CREATE MINIO BUCKETS
  ####################################################

  mc:
    image: minio/mc
    container_name: minio-client

    profiles: [ingest, processing, serve, full]

    depends_on:
      - minio

    entrypoint: >
      /bin/sh -c "
      sleep 10;
      mc alias set local ${MINIO_ENDPOINT} ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY};
      mc mb local/raw;
      mc mb local/staging;
      mc mb local/warehouse;
      exit 0;
      "

  ####################################################
  # IOT GATEWAY — 1 container, 60 stations, 600 s micro-batch
  # Cycles through all 60 stations at 1 call/second per batch,
  # then sleeps to the next wall-clock 10-minute boundary.
  # Station definitions (device_id, city, lat, lon) live in config.yaml.
  ####################################################

  iot-gateway:
    build:
      context: ./iot-gateway
    container_name: iot-gateway
    profiles: [iot, ingest, full]
    depends_on:
      # - kafka-setup
      - kafka

    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_NUM_PARTITIONS: ${KAFKA_NUM_PARTITIONS}
      OWM_API_KEY: ${OWM_API_KEY}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS}
      KILL_AFTER_SECONDS: ${KILL_AFTER_SECONDS}

  ####################################################
  # SPARK CLUSTER (INGESTION)
  ####################################################

  spark-master:
    image: bitnamilegacy/spark:3.5
    container_name: spark-master

    profiles: [ingest, processing, full]

    environment:
      SPARK_MODE: master
      SPARK_MASTER_PORT: 7077
      SPARK_MASTER_WEBUI_PORT: 8081
      SPARK_DAEMON_JAVA_OPTS: "-Dspark.ui.reverseProxy=true -Dspark.ui.reverseProxyUrl=http://localhost:8081"

    ports:
      - "7077:7077"
      - "8081:8081"

  spark-worker:
    build:
      context: ./spark-worker
      dockerfile: Dockerfile.worker
    container_name: spark-worker

    profiles: [ingest, processing, full]

    depends_on:
      - spark-master

    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: ${SPARK_MASTER_URL}
      SPARK_WORKER_MEMORY: ${SPARK_WORKER_MEMORY}
      SPARK_WORKER_CORES: ${SPARK_WORKER_CORES}
      SPARK_WORKER_WEBUI_PORT: 8082
      SPARK_DAEMON_JAVA_OPTS: "-Dspark.ui.reverseProxy=true -Dspark.ui.reverseProxyUrl=http://localhost:8081"

    ports:
      - "8082:8082"

  ####################################################
  # KAFKA RAW CONSUMER (SPARK STRUCTURED STREAMING)
  ####################################################

  kafka-spark-consumer:
    build:
      context: ./kafka-spark-consumer

    container_name: kafka-spark-consumer

    profiles: [ingest, full]

    depends_on:
      - spark-master
      - kafka
      - minio

    environment:
      SPARK_MASTER_URL: ${SPARK_MASTER_URL}

      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_TOPIC: ${KAFKA_TOPIC}

      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}

      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS}

      CONSUMER_TOTAL_EXECUTOR_CORES: ${CONSUMER_TOTAL_EXECUTOR_CORES}
      CONSUMER_EXECUTOR_MEMORY: ${CONSUMER_EXECUTOR_MEMORY}
      CONSUMER_DRIVER_MEMORY: ${CONSUMER_DRIVER_MEMORY}

    volumes:
      - ivy2_cache:/root/.ivy2 # Cache for Spark dependencies
    ports:
      - "4040:4040"

  ####################################################
  # HIVE METASTORE (standalone, Derby-backed)
  # Iceberg catalog registry — no S3 access needed;
  # table locations are stored as strings pointing to MinIO.
  ####################################################

  hive-metastore:
    image: apache/hive:4.0.0
    container_name: hive-metastore

    profiles: [processing, serve, full]

    depends_on:
      - minio

    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: derby
      # Add hadoop-aws + AWS SDK jars so HMS can validate s3a:// schema locations
      HIVE_AUX_JARS_PATH: /opt/hadoop/share/hadoop/tools/lib/hadoop-aws-3.3.6.jar:/opt/hadoop/share/hadoop/tools/lib/aws-java-sdk-bundle-1.12.367.jar

    ports:
      - "9083:9083"

    volumes:
      - hive_metastore_db:/opt/hive/data
      - ./hive/hive-site.xml:/opt/hive/conf/hive-site.xml:ro

  ####################################################
  # SPARK STREAM PROCESSING
  ####################################################

  spark-stream:
    build:
      context: ./spark-stream

    container_name: spark-stream

    profiles: [processing, full]

    depends_on:
      - spark-master
      - minio
      - hive-metastore

    environment:
      SPARK_MASTER_URL:              ${SPARK_MASTER_URL}
      MINIO_ENDPOINT:                ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY:              ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY:              ${MINIO_SECRET_KEY}
      POLL_INTERVAL_SECONDS:         ${POLL_INTERVAL_SECONDS}
      STREAM_TOTAL_EXECUTOR_CORES:   ${STREAM_TOTAL_EXECUTOR_CORES}
      STREAM_EXECUTOR_MEMORY:        ${STREAM_EXECUTOR_MEMORY}
      STREAM_DRIVER_MEMORY:          ${STREAM_DRIVER_MEMORY}

    volumes:
      - ivy2_cache:/root/.ivy2   # cache Iceberg/Hadoop JARs across restarts

    ports:
      - "4041:4040"             # Spark driver UI (4040 is taken by consumer)

  ####################################################
  # TRINO
  ####################################################

  trino:
    image: trinodb/trino:latest
    container_name: trino

    profiles: [serve, full]

    depends_on:
      - minio
      - hive-metastore

    ports:
      - "8080:8080"

    volumes:
      - ./trino/catalog:/etc/trino/catalog
      - ./trino/config.properties:/etc/trino/config.properties

  ####################################################
  # GRAFANA
  ####################################################

  grafana:
    image: grafana/grafana:latest
    container_name: grafana

    profiles: [serve, full]

    depends_on:
      - trino

    ports:
      - "3000:3000"

    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_INSTALL_PLUGINS: trino-datasource

    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning

volumes:
  ivy2_cache:
  hive_metastore_db:

